      // open modal
      images.forEach((img, index) => {
        img.addEventListener("click", () => {
          currentIndex = index;
          showContent();
          modal.style.display = "flex";
          setTimeout(() => modal.classList.add("show"), 10);
        });
      });

      function showContent() {
        modalImg.src = images[currentIndex].src;
        modalTitle.textContent = eventData[currentIndex].title;
        modalDesc.textContent = eventData[currentIndex].desc;

        // rules list
        modalRules.innerHTML = "";
        eventData[currentIndex].rules.forEach((rule) => {
          const li = document.createElement("li");
          li.textContent = rule;
          modalRules.appendChild(li);
        });
      }

      function animateChange(direction) {
        const body = document.querySelector(".modal-body");

        body.classList.remove("slide-in");
        body.classList.add(
          direction === "next" ? "slide-out-left" : "slide-out-right",
        );

        setTimeout(() => {
          showContent();

          body.classList.remove("slide-out-left", "slide-out-right");
          body.classList.add("slide-in");
        }, 200);
      }

      // next
      nextBtn.onclick = () => {
        currentIndex = (currentIndex + 1) % images.length;
        animateChange("next");
      };

      // prev
      prevBtn.onclick = () => {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        animateChange("prev");
      };

      // close
      //   closeBtn.onclick = () => (modal.style.display = "none");
      let isClosing = false;

      function closeModal() {
        if (isClosing) return;
        isClosing = true;

        modal.classList.remove("show");

        setTimeout(() => {
          modal.style.display = "none";
          isClosing = false;
        }, 400);
      }

      closeBtn.onclick = closeModal;

      window.onclick = (e) => {
        if (e.target === modal) {
          closeModal();
        }
      };
    </script>

    <!-- CUSTOM CURSOR -->
    <script>
      const dot = document.querySelector(".cursor-dot");
      const ring = document.querySelector(".cursor-ring");

      let mouseX = 0;
      let mouseY = 0;

      let ringX = 0;
      let ringY = 0;

      // track mouse
      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;

        dot.style.left = mouseX + "px";
        dot.style.top = mouseY + "px";
      });

      // smooth follow (lag effect)
      function animate() {
        ringX += (mouseX - ringX) * 0.15;
        ringY += (mouseY - ringY) * 0.15;

        ring.style.left = ringX + "px";
        ring.style.top = ringY + "px";

        requestAnimationFrame(animate);
      }

      animate();

      // hover detection
      const hoverElements = document.querySelectorAll("button, img, .item");

      hoverElements.forEach((el) => {
        el.addEventListener("mouseenter", () => {
          document.body.classList.add("cursor-hover");
        });

        el.addEventListener("mouseleave", () => {
          document.body.classList.remove("cursor-hover");
        });
      });

      //OPTIONAL

      document.addEventListener("click", () => {
        ring.style.transform = "translate(-50%, -50%) scale(0.7)";
        setTimeout(() => {
          ring.style.transform = "translate(-50%, -50%) scale(1)";
        }, 100);
      });
    </script>
